<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transflower Store</title>

    <!-- Bootstrap -->
    <link href="bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./styles/style.css">

    <style>
        html, body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        #scrollTopBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 20px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="./image/transflower logo.ico" width="40" class="rounded-pill me-2">
            <strong>Transflower Store</strong>
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main>

<!-- Hero -->
<header class="bg-light py-5">
    <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between">
        <div>
            <h1 class="fw-bold text-danger">Fresh Flowers, Fresh Smiles 🌸</h1>
            <p class="lead">Delivering happiness across India</p>
            <a class="btn btn-danger btn-lg" href="#">Start Shopping</a>
        </div>
        <img src="./image/f3.jpg" class="img-fluid rounded shadow" width="400">
    </div>
</header>

<!-- Carousel -->
<div id="storeCarousel" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="./image/f1.jpg" class="d-block w-100">
        </div>
        <div class="carousel-item">
            <img src="./image/f2.jpg" class="d-block w-100">
        </div>
        <div class="carousel-item">
            <img src="./image/f3.jpg" class="d-block w-100">
        </div>
    </div>
</div>

<!-- Cards -->
<section class="py-5">
    <div class="container">
        <h2 class="text-center mb-4">Featured Flowers</h2>
        <div class="row g-4">
            <div class="col-md-4" data-aos="fade-up">
                <div class="card h-100">
                    <img src="./image/rose (2).jpg" class="card-img-top">
                    <div class="card-body text-center">
                        <h5>Red Roses</h5>
                        <button class="btn btn-danger">Add to Cart</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
                <div class="card h-100">
                    <img src="./image/tulip.jpeg" class="card-img-top">
                    <div class="card-body text-center">
                        <h5>Tulips</h5>
                        <button class="btn btn-danger">Add to Cart</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4" data-aos="fade-up" data-aos-delay="400">
                <div class="card h-100">
                    <img src="./image/sunflower.jpg" class="card-img-top">
                    <div class="card-body text-center">
                        <h5>Sunflowers</h5>
                        <button class="btn btn-danger">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</main>

<!-- Scroll Button -->
<button id="scrollTopBtn" class="btn btn-danger">↑</button>

<!-- Footer -->
<footer class="bg-dark text-white py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-1">© 2025 Transflower Store</p>
        <small>Email: support@transflower.in</small>
    </div>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init();

const scrollBtn = document.getElementById("scrollTopBtn");

window.addEventListener("scroll", () => {
    if (document.documentElement.scrollTop > 200) {
        scrollBtn.style.display = "block";
    } else {
        scrollBtn.style.display = "none";
    }
});

scrollBtn.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
});
</script>

</body>
</html>
